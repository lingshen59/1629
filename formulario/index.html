<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Postulación Admin Discord/Ark</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1c2e;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    form {
      background: #1e2a3a;
      padding: 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #00ffd5;
    }
    label {
      display: block;
      margin: 15px 0 5px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2f3e52;
      color: #fff;
      resize: vertical;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #00ffd5;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #00c2a4;
    }
    small {
      color: #aaa;
      font-size: 0.9em;
    }
  </style>
  <script>
    // Protecciones básicas
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.onkeydown = e => {
      if (e.key === "F12" || (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key))) {
        return false;
      }
    };
  </script>
</head>
<body>
  <form name="postulacion" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    <h2>Formulario de Postulación</h2>

    <input type="hidden" name="form-name" value="postulacion" />
    <input type="hidden" name="bot-field" />

    <label>Usuario Discord *</label>
    <input type="text" name="usuario" required />

    <label>ID Discord <small>(opcional)</small></label>
    <input type="text" name="id" />

    <label>País *</label>
    <input type="text" name="pais" required />

    <label>Edad *</label>
    <input type="number" name="edad" required min="1" max="100" />

    <label>¿Cuántas veces has sido admin? *</label>
    <input type="text" name="veces_admin" required />

    <label>¿Qué podrías aportar al servidor? *</label>
    <textarea name="aportacion" required rows="3"></textarea>

    <label>¿Qué hacks tienes? <small>(opcional)</small></label>
    <textarea name="hacks" rows="2"></textarea>

    <label>Experiencia (1 al 10) *</label>
    <input type="number" name="experiencia" required min="1" max="10" />

    <label>Horas disponibles *</label>
    <input type="text" name="horas" required />

    <button type="submit">Enviar postulación</button>
  </form>
</body>
</html>
